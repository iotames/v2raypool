<div class="form" style="margin:8px 0">

  <div class="form-row">
    <label class="form-label-inline">v2ray核心文件</label>
    <input type="text" name="VP_V2RAY_PATH" value="<{% .V2rayPath %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">系统代理地址</label>
    <input type="text" name="VP_HTTP_PROXY" value="<{% .HttpProxy %}>" class="form-control" required oninvalid="this.setCustomValidity('系统代理地址不能为空')" oninput="this.setCustomValidity('')">
  </div>

  <div class="form-row">
    <label class="form-label-inline">Web端口</label>
    <input type="text" name="VP_WEB_SERVER_PORT" value="<{% .WebServerPort %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">代理池gRPC端口</label>
    <input type="text" name="VP_GRPC_PORT" value="<{% .GrpcPort %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">v2rayAPI端口(gRPC)</label>
    <input type="text" name="VP_V2RAY_API_PORT" value="<{% .V2rayApiPort %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">测速地址</label>
    <input type="text" name="VP_TEST_URL" value="<{% .TestUrl %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">订阅地址</label>
    <input type="text" name="VP_SUBSCRIBE_URL" value="<{% .SubscribeUrl %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">订阅数据文件</label>
    <input type="text" name="VP_SUBSCRIBE_DATA_FILE" value="<{% .SubscribeDataFile %}>" class="form-control">
  </div>

</div>
