<div class="form" style="margin:8px 0">

  <div class="form-row">
    <label class="form-label-inline">订阅地址</label>
    <input type="text" disabled name="subscribe_url" value="<{% .SubscribeUrl %}>" class="form-control">
  </div>

  <div class="form-row">
    <label class="form-label-inline">使用代理</label>
    <input type="text" id="subscribeProxyInput" name="subscribe_by_proxy" value="" placeholder="选填。使用代理更新订阅。例: http://127.0.0.1:1080" class="form-control">
  </div>

</div>
